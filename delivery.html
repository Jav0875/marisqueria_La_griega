<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery | Marisquería La Griega</title>

    <link rel="stylesheet" href="styles/style1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <header class="header">
        <div class="logo">
            <a href="index.html" class="imgLogo">
                <img src="img/logoGriega.jpeg" alt="logoGriega">
            </a>
            <div class="titulo">
                <h1>Marisquería</h1>
                <h1>"La Griega"</h1>
            </div>
        </div>

        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="menu.html">Menú</a></li>
            <li><a href="delivery.html">Delivery</a></li>
            <li><a href="reservaciones.html">Reservaciones</a></li>
            <li><a href="#">Nosotros</a></li>
            <li><a href="#">Contacto</a></li>
        </ul>

        <div class="iconos">
            <a href="Login.html"><i class="fa-regular fa-user"></i></a>
            <i class="fa-solid fa-bars"></i>
        </div>
    </header>

    <main class="main-inicio">
        <section class="seccion-delivery">
            <div class="titulo-seccion">
                <span></span>
                <h2>TU PEDIDO DELIVERY</h2>
                <span></span>
            </div>

            <div class="contenedor-delivery">
                <div class="pedido-lista">
                    <h3>Productos agregados</h3>
                    <div id="lista-pedido"></div>
                </div>

                <div class="resumen-pedido">
                    <h3>Resumen del pedido</h3>
                    <p><strong>Total:</strong> <span id="total-pedido">$0.00</span></p>

                    <form id="form-delivery" class="form-delivery">
                        <label for="nombre-cliente">Nombre completo</label>
                        <input type="text" id="nombre-cliente" required>

                        <label for="telefono-cliente">Teléfono</label>
                        <input type="text" id="telefono-cliente" required>

                        <label for="direccion-cliente">Dirección de entrega</label>
                        <textarea id="direccion-cliente" rows="4" required></textarea>

                        <button type="submit" class="btn-principal">CONFIRMAR PEDIDO</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="js/delivery.js"></script>
</body>
</html>
